name: shellcheck

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          additional_files: 'setup.sh'
          ignore_paths: 'node_modules vendor'
          # SC1090: unverified source path (we source dynamic paths intentionally)
          # SC1091: file follow disabled
          # SC2086: word splitting (we sometimes want it)
        env:
          SHELLCHECK_OPTS: "-e SC1090 -e SC1091 -e SC2086"

      - name: Bash syntax check (parse-only)
        run: |
          set -e
          for f in $(find . -name "*.sh" -not -path "./node_modules/*"); do
            bash -n "$f" && echo "ok $f"
          done
